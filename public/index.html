<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HLS Downloader Test</title>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <main class="card">
      <h1>Test API HLS Downloader</h1>
      <p class="hint">Entrez la cle API et une URL de playlist .m3u8</p>

      <p class="hint"><a class="admin-link" href="/admin">Ouvrir le panneau admin</a></p>
      <p class="version-line">Version: <span id="appVersion">chargement...</span></p>

      <label for="apiKey">x-api-key</label>
      <input id="apiKey" type="password" placeholder="Votre cle API" />

      <label for="hlsUrl">URL HLS (.m3u8)</label>
      <input id="hlsUrl" type="url" placeholder="https://.../stream.m3u8" />

      <button id="submitBtn" type="button">Telecharger en MP4</button>

      <h2>Resultat</h2>
      <div id="result">En attente...</div>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
