<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video URL Sender</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Video URL Sender</h1>

      <details id="configSection">
        <summary class="config-summary">&#9881; Configuration</summary>
        <div class="config-panel">
          <label for="serverUrl">Endpoint API</label>
          <input id="serverUrl" type="text" placeholder="http://localhost:3000/api/download" />
          <label for="apiKey" class="spaced-label">API Key</label>
          <input id="apiKey" type="password" placeholder="x-api-key" />
          <button id="saveConfigBtn" type="button" class="save-config-btn">Sauvegarder</button>
        </div>
      </details>

      <div id="mediaUrlSection" class="hidden-section">
        <label for="mediaUrl">URL video detectee</label>
        <textarea id="mediaUrl" rows="4" placeholder="URL .m3u8 ou .mp4"></textarea>
      </div>

      <label for="videoName">Nom de la video</label>
      <input id="videoName" type="text" placeholder="Titre video" />

      <label for="referer">Referer (optionnel)</label>
      <input id="referer" type="text" placeholder="https://site-source.example/" />

      <label for="userAgent">User-Agent (optionnel)</label>
      <input id="userAgent" type="text" placeholder="Mozilla/5.0 ..." />

      <label for="cookie">Cookie (optionnel)</label>
      <textarea id="cookie" rows="2" placeholder="name=value; other=value"></textarea>

      <div class="actions">
        <button id="detectBtn" type="button">Detecter</button>
        <button id="sendBtn" type="button">Download video</button>
        <button id="youtubeBtn" type="button" class="youtube-btn">YouTube</button>
      </div>

      <div id="youtubeSection" class="status-card status-card-youtube hidden-section">
        <div class="status-card-header">
          <span class="status-card-title">YouTube detecte</span>
          <span id="youtubeVideoId" class="status-chip status-chip-youtube"></span>
        </div>
        <div id="youtubeVideoTitle" class="concurrency-info"></div>
      </div>

      <div class="progress-wrap" aria-live="polite">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="progressText" class="progress-text">0%</div>

      <div id="activeSection" class="status-card status-card-active hidden-section">
        <div class="status-card-header">
          <span class="status-card-title">Telechargements actifs</span>
          <span id="activeCount" class="status-chip status-chip-active">0</span>
        </div>
        <div id="concurrencyInfo" class="concurrency-info">Concurrence max: 1</div>
        <ul id="activeList" class="status-list status-list-disc"></ul>
      </div>

      <div id="queueSection" class="status-card status-card-queue hidden-section">
        <div class="status-card-header">
          <span class="status-card-title">File d'attente</span>
          <span id="queueCount" class="status-chip status-chip-queue">0</span>
        </div>
        <ul id="queueList" class="status-list status-list-decimal"></ul>
      </div>

      <div id="statusMsg" class="status-message"></div>
      <pre id="result" class="hidden-log">Pret.</pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
